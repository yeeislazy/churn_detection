version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

  mlflow:
    image: python:3.13-slim
    working_dir: /mlflow
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: >
      sh -c "pip install mlflow && mlflow server --backend-store-uri /mlflow/mlruns --artifacts-destination /mlflow/mlruns --host 0.0.0.0 --port 5000 --allowed-hosts '*' --cors-allowed-origins '*'"
    ports:
      - "5000:5000"