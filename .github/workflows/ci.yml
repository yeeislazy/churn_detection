name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up UV
      uses: astral-sh/setup-uv@v5
      with:
        version: 'latest'

    - name: Sync Dependencies
      run: |
        uv sync --locked --all-extras --dev
    
    - name: Install local package
      run: |
        uv pip install -e .

    - name: Run tests
      run: |
        uv run pytest
  
  build_and_push_images:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Docker login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Get commit SHA
      id: vars
      run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Build and push Docker image with SHA tag
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.api
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/churn-api:${{ steps.vars.outputs.SHA }}

    - name: Build and push Docker image with 'latest' tag
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.api
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/churn-api:latest
    
  deloy:
    runs-on: ubuntu-latest
    needs: build_and_push_images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy on remote server
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd churn-detection/
          sudo systemctl start docker
          sudo systemctl enable docker
          sudo docker compose down
          sudo docker rmi $(sudo docker images -q) .
          sudo docker compose up -d
          sudo docker system prune -f

    - name: Health check
      run: |
        sleep 30
        curl -f http://56.68.56.10:8000/
        curl -f http://56.68.56.10:5000/