name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up UV
      uses: astral-sh/setup-uv@v5
      with:
        version: 'latest'

    - name: Sync Dependencies
      run: |
        uv sync --locked --all-extras --dev

    - name: Run tests
      run: |
        uv run pytest tests/
        
    - name: Build Docker image
      run: |
        docker build -t churn-api .